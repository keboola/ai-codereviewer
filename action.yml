name: "AI Code Review Action v2"
description: "Advanced AI-powered code reviews with multiple model support"
inputs:
  GITHUB_TOKEN:
    description: "GitHub token"
    required: true
  AI_PROVIDER:
    description: "AI provider (openai, anthropic, google)"
    required: true
    default: "openai"
  AI_MODEL:
    description: "AI model to use"
    required: true
    default: "gpt-4"
  AI_API_KEY:
    description: "API key for the chosen AI provider"
    required: true
  AI_BASE_URL:
    description: "Optional base URL for the OpenAI-compatible endpoint. Use this to route the openai provider at GitHub Models (https://models.github.ai/inference) or any other OpenAI-compatible gateway. Has no effect on the anthropic or google providers."
    required: false
  AI_TEMPERATURE:
    description: "Temperature for AI model (higher values = more creativity and variance)"
    required: false
    default: "0"
  APPROVE_REVIEWS:
    description: "Whether to approve/reject PRs automatically"
    required: false
    default: "true"
  APPROVE_CONFIDENCE_THRESHOLD:
    description: "Minimum AI confidence (0-100) required to auto-approve. Below this, an 'approve' verdict is downgraded to 'comment'."
    required: false
    default: "80"
  MAX_COMMENTS:
    description: "Maximum number of review comments"
    required: false
    default: "0"
  MIN_COMMENT_SEVERITY:
    description: "Minimum severity to keep (blocker, major, minor, nit)"
    required: false
    default: "minor"
  PROJECT_CONTEXT:
    description: "Additional context about the project (inline string)."
    required: false
  PROJECT_CONTEXT_FILE:
    description: "Path (in the PR head) to a file containing the project context. When set and present, takes precedence over PROJECT_CONTEXT. Skipped silently if missing."
    required: false
  INSTRUCTIONS_FILE:
    description: "Path (in the PR head) to a Markdown file with repo-specific reviewer instructions. Skipped silently if missing. Combined with INSTRUCTIONS_URL when both are set (URL first as baseline, file appended as repo-specific override)."
    required: false
    default: ".github/ai-review.md"
  INSTRUCTIONS_URL:
    description: "URL to a Markdown file with shared reviewer instructions (e.g. raw.githubusercontent.com URL of a central org-wide config). Lets many repos share one source of truth without per-repo PRs."
    required: false
  INSTRUCTIONS_URL_TOKEN:
    description: "Optional bearer token for INSTRUCTIONS_URL when the source requires authentication (private GitHub raw URLs, etc.). Sent as 'Authorization: Bearer <token>'."
    required: false
  CONTEXT_FILES:
    description: "Files to include in review (comma-separated)"
    required: false
    default: "package.json,README.md"
  EXCLUDE_PATTERNS:
    description: "Files to exclude (glob patterns)"
    required: false
    default: "**/*.lock,**/*.json,**/*.md"
runs:
  using: "node20"
  main: "dist/index.js"
branding:
  icon: "code"
  color: "purple"
