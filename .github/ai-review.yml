# Per-repo overrides for the AI Code Reviewer running on this repo.
# Schema documented in README.md → "Per-repo overrides via .github/ai-review.yml".

# Files attached to every review so the model knows what kind of project this is
# (a TypeScript node-action shipping bundled JS in dist/, with these dependencies).
# The action default is empty; we opt this repo in explicitly.
context_files:
  - package.json
  - tsconfig.json
  - action.yml
  - README.md

# This repo is large enough that the model often needs to fetch helpers / types /
# tests not in the diff. Enable agentic mode so it can call read_file(path) on
# demand instead of guessing. Cost trade-off: more turns, more tokens; gain:
# materially fewer wrong comments rooted in missing context.
agentic_review: true
